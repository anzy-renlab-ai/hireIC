name: Convert Approved Issue to PR

on:
  issue_comment:
    types: [created]

# Eng-review F2: minimal explicit permissions.
permissions:
  issues: write
  contents: write
  pull-requests: write

# Eng-review F1: serialize concurrent /approve so two PRs don't fight over main.
concurrency:
  group: convert-to-main
  cancel-in-progress: false

jobs:
  convert:
    # Filter: only on issues (not PRs); only when comment looks like /approve;
    # only when commenter is the repo owner.
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '/approve') &&
      github.event.comment.author_association == 'OWNER'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Decide convert action
        id: decide
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          AUTHOR_IS_OWNER: ${{ github.event.comment.author_association == 'OWNER' }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ toJSON(github.event.issue.labels) }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OUT_DIR: ${{ runner.temp }}
        run: |
          npx tsx scripts/convert-runner.ts
          DECISION=$(jq -r .kind "$RUNNER_TEMP/convert.decision.json")
          echo "kind=$DECISION" >> $GITHUB_OUTPUT

      - name: Post error comment (if revalidation failed)
        if: steps.decide.outputs.kind == 'error'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const errMsg = fs.readFileSync(process.env.RUNNER_TEMP + '/convert.error.txt', 'utf-8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `(自动校验, 不是 founder 本人)\n\n❌ \`/approve\` 收到, 但重新校验 issue body 失败 (你或别人在 pending-review 后编辑过 issue):\n\n\`\`\`\n${errMsg}\n\`\`\`\n\n请修改 issue 后, founder 再评 \`/approve\`.`,
            });

      - name: Skip if not actionable
        if: steps.decide.outputs.kind != 'convert'
        run: |
          echo "Decision: ${{ steps.decide.outputs.kind }}. Nothing to commit."

      - name: Configure git
        if: steps.decide.outputs.kind == 'convert'
        run: |
          git config user.name "hireic-bot"
          git config user.email "bot@hireic.dev"

      - name: Commit converted file on new branch
        if: steps.decide.outputs.kind == 'convert'
        run: |
          BRANCH=$(cat "$RUNNER_TEMP/convert.branch.txt")
          TARGET_PATH=$(cat "$RUNNER_TEMP/convert.path.txt")
          COMMIT_MSG=$(cat "$RUNNER_TEMP/convert.commit-msg.txt")
          mkdir -p "$(dirname "$TARGET_PATH")"
          cp "$RUNNER_TEMP/convert.markdown.md" "$TARGET_PATH"
          git checkout -b "$BRANCH"
          git add "$TARGET_PATH"
          if git diff --cached --quiet; then
            echo "No changes to commit (file may already exist with identical content)."
            exit 1
          fi
          git commit -m "$COMMIT_MSG"
          git push origin "$BRANCH"

      - name: Open + auto-merge PR
        if: steps.decide.outputs.kind == 'convert'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          script: |
            const fs = require('node:fs');
            const branch = fs.readFileSync(process.env.RUNNER_TEMP + '/convert.branch.txt', 'utf-8').trim();
            const title = fs.readFileSync(process.env.RUNNER_TEMP + '/convert.pr-title.txt', 'utf-8').trim();

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              head: branch,
              base: 'main',
              body: `Auto-generated by hireIC convert-to-pr workflow.\n\nResolves #${process.env.ISSUE_NUMBER}.`,
            });

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.data.number,
                merge_method: 'squash',
              });
            } catch (e) {
              core.warning(`Auto-merge failed: ${e.message}. PR #${pr.data.number} left open for manual merge.`);
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ 已合并: ${pr.data.html_url}\n\n感谢你的提交! Profile / 职位将在 1-2 分钟内出现在仓库目录里, README 计数也会自动更新.`,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });
