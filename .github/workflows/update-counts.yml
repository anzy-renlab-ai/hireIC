name: Update README Counts + web/data.json

on:
  push:
    branches: [main]
    paths:
      - "jobs/**"

permissions:
  contents: write

# Serialize: multiple PRs merging in quick succession all hit main, and
# parallel recounts would race on README. Serialize them.
concurrency:
  group: update-counts
  cancel-in-progress: false

jobs:
  update:
    # Skip if the push was the bot's own commit (avoids loop).
    if: >-
      github.event.head_commit.author.email != 'bot@hireic.dev' ||
      !startsWith(github.event.head_commit.message, 'chore: update counts')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Need a writable token so the bot can push back to main.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Recount and rewrite README
        id: recount
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: |
          set +e
          npx tsx scripts/update-counts-runner.ts
          code=$?
          set -e
          echo "readme_exit=$code" >> $GITHUB_OUTPUT
          # 0 = changed, 1 = no change, 2 = malformed (fail loud).
          if [ "$code" = "2" ]; then exit 2; fi

      - name: Regenerate web/data.json
        id: webdata
        run: |
          node web/build-data.mjs
          # Set output to indicate whether file changed.
          if git diff --quiet -- web/data.json; then
            echo "data_changed=false" >> $GITHUB_OUTPUT
          else
            echo "data_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit + push if anything changed
        if: steps.recount.outputs.readme_exit == '0' || steps.webdata.outputs.data_changed == 'true'
        run: |
          git config user.name "hireic-bot"
          git config user.email "bot@hireic.dev"
          # Stage whichever of the two actually changed.
          git add -- README.md web/data.json
          git diff --cached --quiet && { echo "Nothing staged."; exit 0; }
          git commit -m "chore: update counts (README + web/data.json)"
          git push origin main
