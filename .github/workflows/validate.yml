name: Validate Issue Submission

on:
  issues:
    types: [opened, edited, reopened]

# Minimal permissions (eng-review F2): comment on issues, add labels, nothing else.
permissions:
  issues: write
  contents: read

# Serialize per-issue so an "Edit" during validation doesn't race.
concurrency:
  group: validate-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  validate:
    # Only run for our two Issue Form kinds. Skip on labels we don't recognize.
    if: contains(github.event.issue.labels.*.name, 'candidate') || contains(github.event.issue.labels.*.name, 'job')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Run validator
        id: validate
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ toJSON(github.event.issue.labels) }}
          OUT_DIR: ${{ runner.temp }}
        run: |
          npx tsx scripts/validate-issue.ts
          echo "outcome=$(cat $RUNNER_TEMP/validate.outcome.txt)" >> $GITHUB_OUTPUT
          echo "label=$(cat $RUNNER_TEMP/validate.label.txt)" >> $GITHUB_OUTPUT

      - name: Post bot comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const body = fs.readFileSync(process.env.RUNNER_TEMP + '/validate.comment.md', 'utf-8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Apply pending-review label (on pass)
        if: steps.validate.outputs.outcome == 'pass' && steps.validate.outputs.label != ''
        uses: actions/github-script@v7
        with:
          script: |
            // Remove pending-validation, add pending-review.
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'pending-validation',
              });
            } catch (e) {
              // label may not exist on edit re-runs; ignore.
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['${{ steps.validate.outputs.label }}'],
            });
