<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .bg { fill: #0a0c0a; }
      .fg { fill: #cfe3d2; }
      .accent { fill: #6cf28a; }
      .muted { fill: #8aa392; }
      .dim { fill: #5a6d63; }
      .h1 { font: 700 130px ui-monospace, "JetBrains Mono", "Menlo", monospace; letter-spacing: -0.03em; }
      .tag { font: 400 40px ui-monospace, "JetBrains Mono", monospace; letter-spacing: -0.005em; }
      .meta { font: 500 22px ui-monospace, "JetBrains Mono", monospace; letter-spacing: 0.04em; text-transform: uppercase; }
      .rule { stroke: #2a322c; stroke-width: 2; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="630"/>
  <rect class="accent" x="96" y="180" width="8" height="80"/>
  <g transform="translate(132, 240)">
    <text class="h1 fg" x="0" y="0">hire<tspan class="accent">IC</tspan></text>
    <text class="tag fg" x="0" y="80">open recruiting registry for cc-fluent ICs</text>
    <text class="tag muted" x="0" y="130">JSON Schema · GitHub-native · MCP-readable · MIT</text>
  </g>
  <line class="rule" x1="96" y1="500" x2="1104" y2="500"/>
  <text class="meta dim" x="96" y="555">hire.renlab.ai</text>
  <text class="meta dim" x="1104" y="555" text-anchor="end">github.com/anzy-renlab-ai/hireIC</text>
</svg>
